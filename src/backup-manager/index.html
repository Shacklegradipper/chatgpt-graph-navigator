<!DOCTYPE html>
<html lang="en" data-i18n-title="backupManagerDocumentTitle">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Graph - Backup Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #fafafa;
      --color-surface: #ffffff;
      --color-text: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-text-tertiary: #999999;
      --color-border: #e8e8e8;
      --color-border-light: #f0f0f0;
      --color-accent: #0a0a0a;
      --color-accent-soft: #2a2a2a;
      --color-success: #1a7f37;
      --color-success-bg: #dafbe1;
      --color-error: #cf222e;
      --color-error-bg: #ffebe9;
      --color-warning: #9a6700;
      --color-warning-bg: #fff8c5;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: -1;
    }

    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px 80px;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out-expo) 0.1s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: var(--color-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .header-stats {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--color-surface);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .filter-select {
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--color-surface);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-select:focus {
      border-color: var(--color-accent);
    }

    .filter-date {
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--color-surface);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-date:focus {
      border-color: var(--color-accent);
    }

    .filter-number {
      width: 120px;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--color-surface);
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-number:focus {
      border-color: var(--color-accent);
    }

    .toolbar-btn {
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .toolbar-btn:hover {
      background: var(--color-bg);
      border-color: var(--color-text-tertiary);
    }

    /* Action Bar */
    .action-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: var(--color-accent);
      color: white;
      border-radius: 10px;
      animation: slideDown 0.2s var(--ease-out-expo);
    }

    .action-bar.visible {
      display: flex;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .action-bar .count {
      font-size: 14px;
      font-weight: 500;
      margin-right: auto;
    }

    .action-btn {
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background: transparent;
      color: white;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .action-btn.danger {
      border-color: rgba(255,100,100,0.5);
      color: #ffbbbb;
    }

    .action-btn.danger:hover {
      background: rgba(255,100,100,0.2);
    }

    /* Workspace Folders */
    .ws-folder {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .ws-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .ws-header:hover {
      background: var(--color-bg);
    }

    .ws-arrow {
      font-size: 11px;
      color: var(--color-text-tertiary);
      width: 14px;
      text-align: center;
    }

    .ws-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--color-text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .ws-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--color-accent);
    }

    .ws-body {
      border-top: 1px solid var(--color-border-light);
      max-height: 600px;
      overflow-y: auto;
    }

    .ws-body table {
      width: 100%;
      border-collapse: collapse;
    }

    .ws-body thead {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }

    .load-sentinel {
      height: 1px;
    }

    /* Table (inside folders) */
    table { width: 100%; border-collapse: collapse; }

    thead {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-text-tertiary);
      white-space: nowrap;
      user-select: none;
    }

    th.sortable {
      cursor: pointer;
      transition: color 0.15s;
    }

    th.sortable:hover {
      color: var(--color-text);
    }

    th.sorted {
      color: var(--color-text);
    }

    th .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      vertical-align: middle;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--color-border-light);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: var(--color-bg);
    }

    .col-checkbox {
      width: 40px;
    }

    .col-checkbox input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--color-accent);
    }

    .col-title {
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .col-preview {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text-secondary);
      font-size: 13px;
    }

    .col-date {
      white-space: nowrap;
      font-size: 13px;
      color: var(--color-text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .col-workspace {
      white-space: nowrap;
      font-size: 13px;
    }

    .col-msgs {
      text-align: center;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .col-status {
      white-space: nowrap;
      font-size: 13px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .status-pill.backed-up {
      background: #dafbe1;
      color: #1a7f37;
    }

    .status-pill.not-backed-up {
      background: #ffebe9;
      color: #cf222e;
    }

    .workspace-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .workspace-badge.personal {
      background: #e8f4fd;
      color: #0969da;
    }

    .workspace-badge.team {
      background: #dafbe1;
      color: #1a7f37;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-tertiary);
    }

    .empty-state p {
      font-size: 15px;
      margin-top: 8px;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(250,250,250,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-overlay p {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .page-wrapper {
        padding: 24px 16px 60px;
      }

      .col-preview {
        display: none;
      }

      .col-created, .col-updated {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .toolbar {
        flex-direction: column;
      }

      .search-input {
        min-width: 100%;
      }

      .col-workspace {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <div class="header-left">
        <div class="brand">
          <div class="brand-icon"><img src="/assets/icon128.png" alt="ChatGPT Graph"></div>
        </div>
        <h1 class="header-title" id="page-title" data-i18n="backupManagerPageTitle">Backup Manager</h1>
      </div>
      <div class="header-stats" id="header-stats"></div>
    </header>

    <div class="toolbar">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Search by title or content..."
        data-i18n-placeholder="backupManagerSearchPlaceholder"
      >
      <select class="filter-select" id="date-filter-mode">
        <option value="any" data-i18n="backupManagerDateAny">Any Time</option>
        <option value="after" data-i18n="backupManagerDateAfter">Updated After</option>
        <option value="before" data-i18n="backupManagerDateBefore">Updated Before</option>
        <option value="between" data-i18n="backupManagerDateBetween">Updated Between</option>
      </select>
      <input type="date" class="filter-date" id="date-from" title="From date" data-i18n-title="backupManagerFromDateTitle">
      <input type="date" class="filter-date" id="date-to" title="To date" data-i18n-title="backupManagerToDateTitle">
      <input
        type="number"
        class="filter-number"
        id="latest-count"
        min="1"
        step="1"
        placeholder="Latest N"
        data-i18n-placeholder="backupManagerLatestCountPlaceholder"
      >
      <button class="toolbar-btn" id="select-visible-btn" data-i18n="backupManagerSelectVisible">Select Visible</button>
      <button class="toolbar-btn" id="clear-selection-btn" data-i18n="backupManagerClearSelection">Clear Selection</button>
    </div>

    <div class="action-bar" id="action-bar">
      <span class="count" id="selected-count">0 selected</span>
      <button class="action-btn" id="backup-selected-btn" data-i18n="backupManagerBackupSelected">Backup Selected</button>
      <button class="action-btn" id="export-json-btn" data-i18n="backupManagerExportJson">Export JSON</button>
      <button class="action-btn" id="export-md-btn" data-i18n="backupManagerExportMd">Export MD</button>
      <button class="action-btn" id="export-both-btn" data-i18n="backupManagerExportBoth">Export Both</button>
      <button class="action-btn danger" id="delete-btn" data-i18n="backupManagerDelete">Delete</button>
    </div>

    <div id="folders-container"></div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">&#128451;</div>
      <p data-i18n="backupManagerEmpty">No backups found</p>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text" data-i18n="backupManagerLoading">Loading backups...</p>
  </div>

  <script src="../../dist/backup-manager.js"></script>
</body>
</html>
