<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="popupTitle">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Graph</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #f9fafb;
    }

    .header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e5e7eb;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: #6b7280;
    }

    .status {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      font-weight: 500;
      color: #374151;
    }

    .status-value {
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-value.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status-value.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-value.warning {
      background: #fef3c7;
      color: #92400e;
    }

    .token-info {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }

    .token-info h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #111827;
    }

    .token-preview {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 4px;
      color: #4b5563;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .token-time {
      font-size: 12px;
      color: #6b7280;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.primary:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .help {
      margin-top: 12px;
      padding: 12px;
      background: #eff6ff;
      border-radius: 6px;
      border-left: 3px solid #2563eb;
    }

    .help p {
      font-size: 12px;
      color: #1e40af;
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 语言切换器样式 */
    .language-switcher {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    .language-switcher label {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
    }

    .language-select {
      padding: 4px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: white;
      font-size: 12px;
      color: #1f2937;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
      flex: 1;
    }

    .language-select:hover {
      border-color: #9ca3af;
    }

    .language-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌲 ChatGPT Graph</h1>
    <p data-i18n="popupSubtitle">Conversation Branch Visualizer</p>
  </div>

  <div id="language-switcher-container"></div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 8px;" data-i18n="loading">Loading...</p>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
